<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastAPI 主页</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: system-ui, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            text-align: center;
            padding: 60px 80px;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 16px;
            color: #58a6ff;
        }

        p {
            font-size: 16px;
            color: #8b949e;
            line-height: 1.8;
        }

        code {
            background: #21262d;
            padding: 2px 8px;
            border-radius: 4px;
            color: #7ee787;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>FastAPI 主页</h1>
        <p>这是由 FastAPI 静态文件挂载提供的页面</p>
        <p>访问 <code>/</code> 自动跳转到 <code>/static/index.html</code></p>
    </div>
</body>
</html>
